name: Validate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  macos:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.2
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -1)"
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Preflight
        run: ./scripts/preflight.sh

      - name: Test
        run: swift test

      - name: Build
        run: |
          swift build
          swift build -c release

      - name: Validate scripts
        run: |
          zsh -n \
            scripts/package_app.sh \
            scripts/package_installer.sh \
            scripts/package_release.sh \
            scripts/preflight.sh \
            scripts/validate_app.sh \
            scripts/uninstall_app.sh \
            scripts/installer/preinstall \
            scripts/installer/postinstall

      - name: Render fixture snapshots
        run: |
          swift run AIMeterSnapshot "$RUNNER_TEMP/implementation.png"
          swift run AIMeterSnapshot "$RUNNER_TEMP/settings.png" --settings
          test -s "$RUNNER_TEMP/implementation.png"
          test -s "$RUNNER_TEMP/settings.png"

      - name: Package developer artifacts
        shell: bash
        run: |
          source Config/version.env
          ./scripts/package_app.sh
          ./scripts/package_installer.sh
          ./scripts/validate_app.sh "dist/AI Meter.app"
          ! pkgutil --payload-files "dist/AI Meter-${APP_VERSION}.pkg" \
            | grep -Eq '(^|/)\._|/\.__'

      - name: Check formatting
        run: git diff --check
