name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.2
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -1)"
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          test "${GITHUB_REF_NAME}" = "v${APP_VERSION}"

      - name: Detect signing configuration
        id: signing
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$P12_BASE64" \
              && -n "$P12_PASSWORD" \
              && -n "$KEYCHAIN_PASSWORD" \
              && -n "$NOTARY_KEY_BASE64" \
              && -n "$NOTARY_KEY_ID" \
              && -n "$NOTARY_ISSUER_ID" \
              && -n "$APP_SIGN_IDENTITY" \
              && -n "$INSTALLER_SIGN_IDENTITY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Developer ID signing/notarization secrets are not fully configured; building unsigned release artifacts."
          fi

      - name: Import Developer ID certificates
        if: steps.signing.outputs.available == 'true'
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/ai-meter.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

      - name: Configure notarization
        if: steps.signing.outputs.available == 'true'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          xcrun notarytool store-credentials ai-meter-release \
            --key "$KEY_FILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"

      - name: Test
        run: swift test

      - name: Build, sign, notarize, and validate
        if: steps.signing.outputs.available == 'true'
        env:
          APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
          NOTARY_PROFILE: ai-meter-release
        run: ./scripts/package_release.sh

      - name: Build unsigned release artifacts
        if: steps.signing.outputs.available != 'true'
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          ./scripts/package_app.sh
          ./scripts/package_installer.sh
          shasum -a 256 "dist/AI Meter-${APP_VERSION}.pkg" > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          TAG="v${APP_VERSION}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes --title "AI Meter ${APP_VERSION}"
          fi
          assets=(
            "dist/AI Meter-${APP_VERSION}.pkg"
            "dist/SHA256SUMS"
          )
          if [[ -f "dist/AI Meter-${APP_VERSION}.zip" ]]; then
            assets+=("dist/AI Meter-${APP_VERSION}.zip")
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber
