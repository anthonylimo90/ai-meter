name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.2
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -1)"
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          test "${GITHUB_REF_NAME}" = "v${APP_VERSION}"

      - name: Detect signing configuration
        id: signing
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$P12_BASE64" \
              && -n "$P12_PASSWORD" \
              && -n "$KEYCHAIN_PASSWORD" \
              && -n "$NOTARY_KEY_BASE64" \
              && -n "$NOTARY_KEY_ID" \
              && -n "$NOTARY_ISSUER_ID" \
              && -n "$APP_SIGN_IDENTITY" \
              && -n "$INSTALLER_SIGN_IDENTITY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Developer ID signing/notarization secrets are not fully configured; building unsigned release artifacts."
          fi

      - name: Import Developer ID certificates
        if: steps.signing.outputs.available == 'true'
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/ai-meter.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

      - name: Configure notarization
        if: steps.signing.outputs.available == 'true'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          xcrun notarytool store-credentials ai-meter-release \
            --key "$KEY_FILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"

      - name: Test
        run: swift test

      - name: Build, sign, notarize, and validate
        if: steps.signing.outputs.available == 'true'
        env:
          APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
          NOTARY_PROFILE: ai-meter-release
        run: ./scripts/package_release.sh

      - name: Build unsigned release artifacts
        if: steps.signing.outputs.available != 'true'
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          ./scripts/package_app.sh
          ./scripts/package_installer.sh
          # Zipped .app is the Sparkle update artifact.
          ditto --norsrc --noextattr --noqtn --noacl \
            -c -k --keepParent "dist/AI Meter.app" \
            "dist/AI Meter-${APP_VERSION}.zip"
          shasum -a 256 \
            "dist/AI Meter-${APP_VERSION}.pkg" \
            "dist/AI Meter-${APP_VERSION}.zip" > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          TAG="v${APP_VERSION}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes --title "AI Meter ${APP_VERSION}"
          fi
          assets=(
            "dist/AI Meter-${APP_VERSION}.pkg"
            "dist/SHA256SUMS"
          )
          if [[ -f "dist/AI Meter-${APP_VERSION}.zip" ]]; then
            assets+=("dist/AI Meter-${APP_VERSION}.zip")
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber

      - name: Publish Sparkle appcast to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          source Config/version.env
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY is not set; skipping appcast publish. In-app updates will not be offered until this is configured."
            exit 0
          fi
          TAG="v${APP_VERSION}"
          ZIP="dist/AI Meter-${APP_VERSION}.zip"
          test -f "$ZIP"

          # Resolve the uploaded zip asset's public download URL.
          ENCLOSURE_URL="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)"
          test -n "$ENCLOSURE_URL"

          # Sign the archive and generate the appcast.
          KEY_FILE="$(mktemp)"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          ZIP_PATH="$ZIP" ENCLOSURE_URL="$ENCLOSURE_URL" ED_KEY_FILE="$KEY_FILE" \
            OUTPUT="dist/appcast.xml" ./scripts/make_appcast.sh
          rm -f "$KEY_FILE"

          # Publish appcast.xml to the gh-pages branch.
          PAGES_DIR="$(mktemp -d)"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --depth 1 --branch gh-pages "$REMOTE" "$PAGES_DIR" 2>/dev/null; then
            :
          else
            git clone --depth 1 "$REMOTE" "$PAGES_DIR"
            git -C "$PAGES_DIR" checkout --orphan gh-pages
            git -C "$PAGES_DIR" rm -rf . >/dev/null 2>&1 || true
          fi
          cp dist/appcast.xml "$PAGES_DIR/appcast.xml"
          touch "$PAGES_DIR/.nojekyll"
          git -C "$PAGES_DIR" config user.name "github-actions[bot]"
          git -C "$PAGES_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$PAGES_DIR" add appcast.xml .nojekyll
          git -C "$PAGES_DIR" commit -m "Update appcast for ${APP_VERSION}" \
            || { echo "appcast unchanged"; exit 0; }
          git -C "$PAGES_DIR" push origin gh-pages
